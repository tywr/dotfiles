# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g mouse on
set -sg escape-time 1
set-option -g default-shell /bin/zsh
set-option -g default-command /bin/zsh
# set -g default-terminal "xterm-kitty"

unbind-key -a
unbind C-b
set-option -g prefix C-b
bind-key t new-window
bind-key d detach-client
bind-key f command-prompt "find-window '%%'"
bind-key n next-window
bind-key x kill-pane
bind-key = split-window -h 
bind-key l select-pane -R
bind-key h select-pane -L
bind-key : command-prompt

bind-key 1 select-window -t 1
bind-key 2 select-window -t 2
bind-key 3 select-window -t 3
bind-key 4 select-window -t 4
bind-key 5 select-window -t 5
bind-key 6 select-window -t 6
bind-key 7 select-window -t 7
bind-key 8 select-window -t 8
bind-key 9 select-window -t 9


set-window-option -g automatic-rename on
set-option -g set-titles on
set -g status-position top

set -g base-index 1
set -g status-bg colour0
set-option -gq status-left-length 150
set-option -gq status-right-length 150
set -g status-justify 'centre'
set -g message-style fg='#B0BEC5',bg='#263238'
setw -g window-status-activity-style fg=black,bg=colour2,none
setw -g window-status-separator '#[fg=colour00,bg=colour16] '
setw -g window-status-style fg=colour00,bg=colour00,none
set -g status-right '#[bg=default,fg=none]  #S  '
set -g status-left '#[fg=colour234,bg=colour16]#[fg=colour15,bg=colour234] #S #[fg=colour234,bg=colour16] '
setw -g window-status-format '#[fg=colour240,bg=colour16]  #I  '
setw -g window-status-current-format '#[fg=colour234,bg=colour16]#[fg=colour15,bg=colour234] #I #[fg=colour234,bg=colour16]'

set -gu pane-border-format
set -gu pane-border-status
set -gu pane-border-indicators
set -g pane-border-lines heavy

set -g pane-border-style fg=colour8
set -g pane-active-border-style fg=colour2

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

[buildPlans.IosevkaCustom]
family = "Iosevka Tywr"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false
# webfontFormats = ['ttf', 'woff2']

[buildPlans.IosevkaCustom.variants.design]
one = "base"
five = "upright-arched-serifless"
six = "closed-contour"
seven = "straight-serifless"
eight = "two-circles"
nine = "closed-contour"
zero = "slashed"
capital-a = "curly-serifless"
capital-g = "toothless-corner-serifless-hooked"
capital-j = "serifed"
capital-k = "symmetric-connected-serifless"
capital-q = "crossing-baseline"
capital-v = "curly-serifless"
capital-w = "curly-serifless"
capital-y = "straight-serifless"
a = "double-storey-serifless"
d = "toothed-serifless"
e = "flat-crossbar"
f = "flat-hook-serifless-crossbar-at-x-height"
g = "single-storey-serifless"
j = "flat-hook-serifed"
k = "symmetric-connected-serifless"
l = "serifed"
m = "short-leg-serifless"
t = "flat-hook"
v = "curly-serifless"
w = "curly-serifless"
y = "cursive-serifless"
z = "straight-serifless"
tittle = "square"
diacritic-dot = "square"
punctuation-dot = "square"
braille-dot = "round"
asterisk = "penta-low"
paren = "flat-arc"
brace = "straight"
number-sign = "upright"
at = "threefold"
percent = "dots"
bar = "natural-slope"
question = "smooth"
decorative-angle-brackets = "tall"
lig-ltgteq = "flat"
lig-single-arrow-bar = "without-notch"

[buildPlans.IosevkaCustom.widths.Normal]
shape = 576
menu = 5
css = "normal"

[buildPlans.IosevkaCustom.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IosevkaCustom.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.IosevkaCustom.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaCustom.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
